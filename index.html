<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>متجر صرح الغذاء</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 10px; }
        input { width: 90%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; }
        .card { background: white; padding: 10px; margin: 5px auto; width: 95%; max-width: 400px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-order { background: #25D366; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🛒 صرح الغذاء</h1>
    <input type="text" id="search" onkeyup="filter()" placeholder="ابحث عن منتج...">
    <div id="products"></div>
    <h3>المجموع: <span id="total">0</span> ر.س</h3>
    <button class="btn-order" onclick="send()">إتمام الطلب عبر واتساب</button>

    <script>
        // يمكنك إضافة الـ 400 منتج هنا بنفس النمط
        const items = [
            {n: "ليز حار نار", p: 7}, {n: "آيس تي خوخ", p: 4}, {n: "بيبسي", p: 3},
            {n: "نودلز بولداك", p: 10}, {n: "ماء نوفا", p: 1}, {n: "شوكولاتة جالكسي", p: 5}
        ];

        function load() {
            let list = document.getElementById("products");
            items.forEach(item => {
                list.innerHTML += `<div class="card"><span>${item.n} - ${item.p} ر.س</span> <button class="btn-add" onclick="add('${item.n}', ${item.p})">إضافة</button></div>`;
            });
        }
        
        function filter() {
            let val = document.getElementById("search").value.toLowerCase();
            let cards = document.getElementsByClassName("card");
            for(let i=0; i<cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(val) ? "" : "none";
            }
        }

        let cart = [], total = 0;
        function add(n, p) { cart.push({n, p}); total += p; document.getElementById("total").innerText = total; }

        function send() {
            let counts = {};
            cart.forEach(i => { counts[i.n] = (counts[i.n] || 0) + 1; });
            let msg = "طلب جديد من صرح الغذاء:%0A";
            for (let n in counts) msg += `- ${n} ${counts[n] > 1 ? '('+counts[n]+')' : ''}%0A`;
            window.location.href = "https://wa.me/966553990751 msg + "%0Aالمجموع: " + total + " ر.س";
        }
        load();
    </script>
</body>
</html>>
